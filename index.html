<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hibatty Store</title>

  <style>
    body{
      margin:0;
      font-family:Georgia, serif;
      background:#f7f3ef;
      color:#2d2d2d;
    }

    .hero{
      text-align:center;
      padding:80px 20px 50px;
    }

    .hero h1{
      font-size:52px;
      letter-spacing:6px;
      margin-bottom:10px;
    }

    .hero p{
      color:#7a7a7a;
      font-size:18px;
    }

    .products{
      display:flex;
      justify-content:center;
      gap:30px;
      flex-wrap:wrap;
      padding:20px 30px 80px;
    }

    .card{
      background:white;
      border-radius:24px;
      overflow:hidden;
      width:280px;
      box-shadow:0 6px 18px rgba(0,0,0,0.08);
    }

    .card img{
      width:100%;
      height:340px;
      object-fit:cover;
    }

    .card-content{
      padding:20px;
    }

    .card h3{
      font-size:24px;
      margin-bottom:8px;
    }

    .price{
      color:#8a8a8a;
      margin-bottom:18px;
    }

    button{
      width:100%;
      padding:12px;
      border:none;
      border-radius:30px;
      background:#1f1f1f;
      color:white;
      font-size:15px;
    }
  </style>
</head>

<body>

<div class="hero">
  <h1>HIBATTY STORE</h1>
  <p>Soft Modesty • Timeless Elegance</p>
</div>

<div class="products">

  <div class="card">
    <img src="https://images.unsplash.com/photo-1583391733981-849c1f2c4e6d?q=80&w=1200&auto=format&fit=crop">
    <div class="card-content">
      <h3>Sage Abaya</h3>
      <p class="price">₹2499</p>
      <button>Add to Cart</button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1524504388940-b1c1722653e1?q=80&w=1200&auto=format&fit=crop">
    <div class="card-content">
      <h3>Powder Blue Hijab</h3>
      <p class="price">₹499</p>
      <button>Add to Cart</button>
    </div>
  </div>

  <div class="card">
    <img src="https://images.unsplash.com/photo-1494790108377-be9c29b29330?q=80&w=1200&auto=format&fit=crop">
    <div class="card-content">
      <h3>Ivory Jilbab</h3>
      <p class="price">₹2999</p>
      <button>Add to Cart</button>
    </div>
  </div>

</div>

</body>
</html>
